name: sync-linode-dns

# Requires CLOUDFLARE_DNS_API_TOKEN (Zone DNS Edit on aday.net.au).
# Pages-only CLOUDFLARE_API_TOKEN cannot create dns_records (HTTP 403).
# After DNS sync, run deploy-linode on macroverse.aday.net.au to reload nginx.

on:
  workflow_dispatch:

jobs:
  sync-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout macroverse stack (DNS script)
        uses: actions/checkout@v4
        with:
          repository: aday1/macroverse.aday.net.au
          ref: main
          path: macroverse-stack

      - name: Upsert dev lane DNS (required)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DNS_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_NAME: aday.net.au
          SYNC_MODE: dev-only
        run: bash macroverse-stack/ops/sync-cloudflare-dns.sh

      - name: Upsert remaining Linode DNS (best effort)
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_DNS_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_NAME: aday.net.au
          SYNC_MODE: all
        run: bash macroverse-stack/ops/sync-cloudflare-dns.sh
